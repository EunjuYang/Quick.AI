name: "CI - Linux Meson Build"

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: meson build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, ubuntu-24.04 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libopenblas-dev \
            libflatbuffers-dev \
            flatbuffers-compiler

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install meson and ninja
        run: pip install meson ninja

      - name: Meson setup
        run: meson setup build

      - name: Build
        run: ninja -C build

      - name: Verify build artifacts
        run: |
          test -f build/libcausallm.so
          test -x build/nntr_causallm
          test -x build/nntr_quantize
          test -x build/test_api
          ./build/nntr_causallm 2>&1 | head -1
          ./build/nntr_quantize 2>&1 | head -1
